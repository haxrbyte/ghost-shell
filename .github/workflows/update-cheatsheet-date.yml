name: Update CTF Cheatsheet Date

on:
  push:
    paths:
      - 'docs/cheatsheets/ctf-cheatsheet.md'
      - 'Cheatsheets/ctf-cheatsheet.md'

permissions:
  contents: write

jobs:
  update-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update date in docs/cheatsheets
        run: |
          FILE="docs/cheatsheets/ctf-cheatsheet.md"
          if [ -f "$FILE" ]; then
            DATE=$(date -u +"%d %b %Y")
            sed -i "s/^### UPDATE DATE:.*/### UPDATE DATE: $DATE/" "$FILE"
          fi

      - name: Update date in Cheatsheets
        run: |
          FILE="Cheatsheets/ctf-cheatsheet.md"
          if [ -f "$FILE" ]; then
            DATE=$(date -u +"%d %b %Y")
            sed -i "s/^### UPDATE DATE:.*/### UPDATE DATE: $DATE/" "$FILE"
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (
            git add docs/cheatsheets/ctf-cheatsheet.md Cheatsheets/ctf-cheatsheet.md 2>/dev/null
            git commit -m "Auto-update CTF cheatsheet date [skip ci]"
            git push
          )
