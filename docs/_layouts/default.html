<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">

  {%- seo -%}
  {% if page.canonical %}
    <link rel="canonical" href="{{ page.canonical | absolute_url }}">
  {% else %}
    <link rel="canonical" href="{{ page.url | absolute_url }}">
  {% endif %}

  <!-- Prism.js for syntax highlighting (bash, python, markup/html) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/command-line/prism-command-line.min.js"></script>
</head>
<body>
  <div class="wrapper">{{ content }}</div>
  <script>
    // 1. Capture original language from kramdown wrapper and inject labels
    document.querySelectorAll('pre code').forEach(function(block) {
      var lang = null;

      // kramdown/Rouge: div.language-bash.highlighter-rouge > div.highlight > pre > code
      var wrapper = block.closest('[class*="language-"]');
      if (wrapper) {
        var match = wrapper.className.match(/language-([a-z0-9+\-]+)/i);
        if (match) lang = match[1].toUpperCase();
      }

      // Fallback: check <code> element itself
      if (!lang) {
        var cm = block.className.match(/language-([a-z0-9+\-]+)/i);
        if (cm) lang = cm[1].toUpperCase();
      }

      // Store original language
      block.setAttribute('data-lang', lang || 'CODE');

      // Inject language label into the DOM
      var container = block.closest('div.highlight') || block.parentElement;
      if (container && !container.querySelector('.hx-lang')) {
        container.style.position = container.style.position || 'relative';
        var label = document.createElement('div');
        label.className = 'hx-lang';
        label.textContent = lang || 'CODE';
        container.appendChild(label);
      }

      // 2. Add the correct Prism language class to <code> so Prism can highlight it
      var langMap = { 'BASH': 'bash', 'PYTHON': 'python', 'HTML': 'markup', 'XML': 'markup' };
      var prismLang = langMap[lang] || (lang ? lang.toLowerCase() : 'bash');

      // Remove any existing language classes, then add the Prism one
      block.className = block.className.replace(/language-\S+/g, '');
      block.classList.add('language-' + prismLang);

      // Also set on <pre> (Prism looks at both)
      var pre = block.closest('pre');
      if (pre) {
        pre.className = pre.className.replace(/language-\S+/g, '');
        pre.classList.add('language-' + prismLang);
      }
    });

    // 3. Run Prism on all code blocks
    Prism.highlightAll();
  </script>
  <script defer src="{{ '/assets/js/clipboard.js' | relative_url }}"></script>
</body>
</html>
