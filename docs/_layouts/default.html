<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">

  {%- seo -%}
  {% if page.canonical %}
    <link rel="canonical" href="{{ page.canonical | absolute_url }}">
  {% else %}
    <link rel="canonical" href="{{ page.url | absolute_url }}">
  {% endif %}

  <!-- highlight.js for syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
  <div class="wrapper">{{ content }}</div>
  <script>
    // 1. Capture original language from markdown and inject label BEFORE hljs runs
    document.querySelectorAll('pre code').forEach(function(block) {
      var lang = null;

      // kramdown/Rouge structure: div.language-bash.highlighter-rouge > div.highlight > pre > code
      // The language class is on the outermost wrapper div, NOT on <code>
      var wrapper = block.closest('[class*="language-"]');
      if (wrapper) {
        var match = wrapper.className.match(/language-([a-z0-9+\-]+)/i);
        if (match) lang = match[1].toUpperCase();
      }

      // Fallback: check the <code> element itself (custom layouts)
      if (!lang) {
        var cm = block.className.match(/language-([a-z0-9+\-]+)/i);
        if (cm) lang = cm[1].toUpperCase();
      }

      // Store the original language so nothing can overwrite it
      block.setAttribute('data-lang', lang || 'CODE');

      // Inject the language label directly into the DOM now
      var container = block.closest('div.highlight') || block.parentElement;
      if (container && !container.querySelector('.hx-lang')) {
        container.style.position = container.style.position || 'relative';
        var label = document.createElement('div');
        label.className = 'hx-lang';
        label.textContent = lang || 'CODE';
        container.appendChild(label);
      }
    });

    // 2. Force highlight.js to use the markdown language, not auto-detect
    hljs.configure({ languages: ['bash', 'python', 'xml'] });
    document.querySelectorAll('pre code').forEach(function(block) {
      var lang = block.getAttribute('data-lang');
      if (lang) {
        // Remove any existing language classes hljs might conflict with
        block.className = block.className.replace(/language-\S+/g, '');
        // Map display names back to hljs language ids
        var langMap = { 'BASH': 'bash', 'PYTHON': 'python', 'HTML': 'xml', 'XML': 'xml' };
        var hljsLang = langMap[lang] || lang.toLowerCase();
        block.classList.add('language-' + hljsLang);
      }
      hljs.highlightElement(block);
    });
  </script>
  <script defer src="{{ '/assets/js/clipboard.js' | relative_url }}"></script>
</body>
</html>
