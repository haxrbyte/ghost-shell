<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">

  {%- seo -%}
  {% if page.canonical %}
    <link rel="canonical" href="{{ page.canonical | absolute_url }}">
  {% else %}
    <link rel="canonical" href="{{ page.url | absolute_url }}">
  {% endif %}

  <!-- highlight.js for syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
  <div class="wrapper">{{ content }}</div>
  <script>
    // 1. Capture original language tags from markdown BEFORE anything else runs
    document.querySelectorAll('pre code').forEach(function(block) {
      var match = block.className.match(/language-([a-z0-9+\-]+)/i);
      if (match) {
        block.setAttribute('data-lang', match[1].toUpperCase());
      }
    });

    // 2. Run highlight.js (restricted to bash, python, html)
    hljs.configure({ languages: ['bash', 'python', 'xml'] });
    document.querySelectorAll('pre code').forEach(function(block) {
      hljs.highlightElement(block);
    });
  </script>
  <script defer src="{{ '/assets/js/clipboard.js' | relative_url }}"></script>
</body>
</html>
